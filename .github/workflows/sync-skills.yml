name: Sync skills from ai-plugin

on:
    workflow_dispatch:
    schedule:
        - cron: '17 6 * * *'

permissions:
    contents: write
    pull-requests: write

jobs:
    sync-skills:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout posthog-pi
              uses: actions/checkout@v6

            - name: Checkout ai-plugin
              uses: actions/checkout@v6
              with:
                  repository: PostHog/ai-plugin
                  path: ai-plugin

            - name: Sync skills
              env:
                  AI_PLUGIN_DIR: ${{ github.workspace }}/ai-plugin
              run: |
                  bash ./scripts/sync-skills.sh

            - name: Create pull request
              uses: peter-evans/create-pull-request@v7
              with:
                  commit-message: 'chore: sync skills from ai-plugin'
                  branch: chore/sync-ai-plugin-skills
                  delete-branch: true
                  title: 'chore: sync skills from ai-plugin'
                  body: |
                      ## Summary
                      - sync bundled PostHog pi skills from `PostHog/ai-plugin`

                      This PR was created automatically by the sync-skills workflow.
                  add-paths: |
                      skills/**
