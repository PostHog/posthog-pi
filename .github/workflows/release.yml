name: 'Release'

on:
    push:
        branches: [main]
        paths:
            - '.changeset/**'
    workflow_dispatch:

permissions:
    contents: read

# Concurrency control: only one release process can run at a time
# This prevents race conditions if multiple PRs with 'release' label merge simultaneously
concurrency:
    group: release
    cancel-in-progress: false

jobs:
    resolve-release-context:
        name: Resolve release context
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        outputs:
            should-release: ${{ steps.resolve.outputs.should-release }}
            bump-type: ${{ steps.resolve.outputs.bump-type }}
        steps:
            - name: Resolve release request
              id: resolve
              env:
                  GH_TOKEN: ${{ github.token }}
                  EVENT_NAME: ${{ github.event_name }}
                  CURRENT_REF: ${{ github.ref }}
                  DEFAULT_BRANCH: main
                  PUSH_SHA: ${{ github.sha }}
                  PUSH_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
              run: |
                  set -euo pipefail

                  SHOULD_RELEASE=false
                  BUMP_TYPE=""

                  if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                    if [ "$CURRENT_REF" != "refs/heads/$DEFAULT_BRANCH" ]; then
                      echo "::notice::Skipping release because workflow_dispatch must be run on $DEFAULT_BRANCH, got $CURRENT_REF."
                    else
                      SHOULD_RELEASE=true
                      echo "✓ Manual release requested on $DEFAULT_BRANCH"
                    fi

                    echo "should-release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
                    echo "bump-type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [[ "${PUSH_HEAD_COMMIT_MESSAGE:-}" == *"[version bump]"* || "${PUSH_HEAD_COMMIT_MESSAGE:-}" == "Bump version to "* || "${PUSH_HEAD_COMMIT_MESSAGE:-}" == "chore: Release v"* || "${PUSH_HEAD_COMMIT_MESSAGE:-}" == "chore: release "* ]]; then
                    echo "::notice::Skipping release for the automated version bump commit."
                    echo "should-release=false" >> "$GITHUB_OUTPUT"
                    echo "bump-type=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  PRS_JSON=$(gh api "repos/${{ github.repository }}/commits/$PUSH_SHA/pulls")
                  MATCHING_PR_COUNT=$(echo "$PRS_JSON" | jq --arg branch "$DEFAULT_BRANCH" '[.[] | select(.merged_at != null and .base.ref == $branch and (.labels | map(.name) | index("release")))] | length')

                  if [ "$MATCHING_PR_COUNT" -eq 0 ]; then
                    ASSOCIATED_PRS=$(echo "$PRS_JSON" | jq -r '[.[].number | tostring] | join(", ")')
                    if [ -n "$ASSOCIATED_PRS" ]; then
                      echo "::notice::Skipping release because push $PUSH_SHA is associated with PR(s) [$ASSOCIATED_PRS], but none currently have the release label."
                    else
                      echo "::notice::Skipping release because push $PUSH_SHA is not associated with a merged PR to $DEFAULT_BRANCH that has the release label."
                    fi
                    echo "should-release=false" >> "$GITHUB_OUTPUT"
                    echo "bump-type=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  RELEASE_PRS=$(echo "$PRS_JSON" | jq -r --arg branch "$DEFAULT_BRANCH" '[.[] | select(.merged_at != null and .base.ref == $branch and (.labels | map(.name) | index("release"))) | "#\(.number)"] | join(", ")')
                  echo "✓ Release requested by push $PUSH_SHA via $RELEASE_PRS"
                  echo "should-release=true" >> "$GITHUB_OUTPUT"
                  echo "bump-type=" >> "$GITHUB_OUTPUT"

    check-release-label:
        name: Check for release label
        needs: resolve-release-context
        runs-on: ubuntu-latest
        # Run when PR with 'release' label is merged to main, or on manual dispatch
        if: needs.resolve-release-context.outputs.should-release == 'true'
        outputs:
            should-release: ${{ steps.check.outputs.should-release }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: main
                  fetch-depth: 0

            - name: Check release conditions
              id: check
              run: |
                  changeset_count=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
                  if [ "$changeset_count" -gt 0 ]; then
                    echo "should-release=true" >> "$GITHUB_OUTPUT"
                    echo "Found $changeset_count changeset(s), ready to release"
                  else
                    echo "should-release=false" >> "$GITHUB_OUTPUT"
                    echo "No changesets to release"
                  fi

    notify-approval-needed:
        name: Notify Slack - Approval Needed
        needs: check-release-label
        if: needs.check-release-label.outputs.should-release == 'true'
        uses: posthog/.github/.github/workflows/notify-approval-needed.yml@dd6539b8ffc0cbb64aac209d7fcc6d3fdd7af37e # main
        with:
            slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
            slack_user_group_id: ${{ vars.GROUP_CLIENT_LIBRARIES_SLACK_GROUP_ID }}
        secrets:
            slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
            posthog_project_api_key: ${{ secrets.POSTHOG_PROJECT_API_KEY }}

    version-bump:
        name: Bump version and commit to main
        needs: [resolve-release-context, check-release-label, notify-approval-needed]
        runs-on: ubuntu-latest
        if: always() && needs.resolve-release-context.outputs.should-release == 'true' && needs.check-release-label.outputs.should-release == 'true'
        environment: 'Release'
        permissions:
            contents: write
        outputs:
            committed: ${{ steps.commit-version-bump.outputs.committed }}
            new-version: ${{ steps.apply-changesets.outputs.new-version }}
        steps:
            - name: Notify Slack - Approved
              continue-on-error: true
              uses: posthog/.github/.github/actions/slack-thread-reply@dd6539b8ffc0cbb64aac209d7fcc6d3fdd7af37e # main
              with:
                  slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
                  slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
                  thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
                  message: '✅ Release approved! Version bump in progress...'
                  emoji_reaction: 'white_check_mark'

            - name: Get GitHub App token
              id: releaser
              uses: actions/create-github-app-token@v2
              with:
                  app-id: ${{ secrets.GH_APP_POSTHOG_PI_RELEASER_APP_ID }}
                  private-key: ${{ secrets.GH_APP_POSTHOG_PI_RELEASER_PRIVATE_KEY }}

            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: main
                  fetch-depth: 0
                  token: ${{ steps.releaser.outputs.token }}

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Setup environment
              uses: ./.github/actions/setup

            - name: Apply changesets and update version
              id: apply-changesets
              run: |
                  pnpm changeset version
                  new_version=$(node -p "require('./package.json').version")
                  echo "new-version=$new_version" >> "$GITHUB_OUTPUT"

            - name: Sync version.ts
              env:
                  NEW_VERSION: ${{ steps.apply-changesets.outputs.new-version }}
              run: |
                  sed -i "s/export const VERSION = '.*'/export const VERSION = '${NEW_VERSION}'/" src/version.ts

            - name: Update lockfile
              run: pnpm install --no-frozen-lockfile

            - name: Commit version bump and lockfile
              id: commit-version-bump
              env:
                  GITHUB_TOKEN: ${{ steps.releaser.outputs.token }}
                  NEW_VERSION: ${{ steps.apply-changesets.outputs.new-version }}
              run: |
                  git add -A
                  if git diff --staged --quiet; then
                    echo "No changes to commit"
                    echo "committed=false" >> "$GITHUB_OUTPUT"
                  else
                    git commit -m "chore: release ${NEW_VERSION} [version bump]"
                    git push origin main
                    echo "committed=true" >> "$GITHUB_OUTPUT"
                  fi

    notify-rejected:
        name: Notify Slack - Rejected
        needs: [version-bump, notify-approval-needed]
        runs-on: ubuntu-latest
        if: always() && needs.version-bump.result == 'failure' && needs.notify-approval-needed.outputs.slack_ts != ''
        steps:
            - name: Check for rejection
              id: check-rejection
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  RESPONSE=$(gh api /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/approvals)
                  REJECTED=$(echo "$RESPONSE" | jq '[.[] | select(.state == "rejected")] | length')
                  if [ "$REJECTED" -gt 0 ]; then
                    echo "was_rejected=true" >> "$GITHUB_OUTPUT"
                    COMMENT=$(echo "$RESPONSE" | jq -r '.[] | select(.state == "rejected") | .comment // empty' | head -1)
                    if [ -n "$COMMENT" ]; then
                      {
                        echo 'message<<EOF'
                        echo "🚫 Release was rejected: $COMMENT"
                        echo 'EOF'
                      } >> "$GITHUB_OUTPUT"
                    else
                      echo "message=🚫 Release was rejected." >> "$GITHUB_OUTPUT"
                    fi
                  else
                    echo "was_rejected=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Notify Slack - Rejected
              if: steps.check-rejection.outputs.was_rejected == 'true'
              continue-on-error: true
              uses: posthog/.github/.github/actions/slack-thread-reply@dd6539b8ffc0cbb64aac209d7fcc6d3fdd7af37e # main
              with:
                  slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
                  slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
                  thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
                  message: '${{ steps.check-rejection.outputs.message }}'
                  emoji_reaction: 'no_entry_sign'

    publish:
        name: Publish to NPM
        needs: [version-bump, notify-approval-needed]
        runs-on: ubuntu-latest
        if: always() && needs.version-bump.outputs.committed == 'true'
        permissions:
            contents: write
            id-token: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: main
                  fetch-depth: 0

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Setup environment
              uses: ./.github/actions/setup

            - name: Check package version
              id: check-package-version
              uses: PostHog/check-package-version@v2

            - name: Typecheck
              if: steps.check-package-version.outputs.is-new-version == 'true'
              run: pnpm typecheck

            - name: Test
              if: steps.check-package-version.outputs.is-new-version == 'true'
              run: pnpm test

            - name: Tag repository
              if: steps.check-package-version.outputs.is-new-version == 'true'
              env:
                  COMMITTED_VERSION: ${{ steps.check-package-version.outputs.committed-version }}
              run: |
                  git tag -a "$COMMITTED_VERSION" -m "$COMMITTED_VERSION"

            - name: Publish to NPM
              if: steps.check-package-version.outputs.is-new-version == 'true'
              run: pnpm publish --access public --no-git-checks
              env:
                  NPM_CONFIG_PROVENANCE: true

            - name: Push tag to GitHub
              if: steps.check-package-version.outputs.is-new-version == 'true'
              env:
                  COMMITTED_VERSION: ${{ steps.check-package-version.outputs.committed-version }}
              run: |
                  git push origin "$COMMITTED_VERSION"

            - name: Create GitHub Release
              if: steps.check-package-version.outputs.is-new-version == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
                  COMMITTED_VERSION: ${{ steps.check-package-version.outputs.committed-version }}
                  GH_REPOSITORY: ${{ github.repository }}
              run: |
                  LAST_CHANGELOG_ENTRY=$(awk -v defText="see CHANGELOG.md" '/^## /{if (flag) exit; flag=1; next} flag && /^##$/{exit} flag; END{if (!flag) print defText}' CHANGELOG.md)
                  gh api \
                    --method POST \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "/repos/${GH_REPOSITORY}/releases" \
                    -f tag_name="$COMMITTED_VERSION" \
                    -f target_commitish='main' \
                    -f name="$COMMITTED_VERSION" \
                    -f body="$LAST_CHANGELOG_ENTRY" \
                    -F draft=false \
                    -F prerelease=false \
                    -F generate_release_notes=false

            - name: Send failure event to PostHog
              if: ${{ failure() }}
              uses: PostHog/posthog-github-action@v1
              with:
                  posthog-token: '${{ secrets.POSTHOG_PROJECT_API_KEY }}'
                  event: 'posthog-pi-github-release-workflow-failure'
                  properties: >-
                      {
                        "commitSha": "${{ github.sha }}",
                        "jobStatus": "${{ job.status }}",
                        "ref": "${{ github.ref }}",
                        "version": "${{ steps.check-package-version.outputs.committed-version }}"
                      }

            - name: Notify Slack - Failed
              continue-on-error: true
              if: ${{ failure() && needs.notify-approval-needed.outputs.slack_ts != '' }}
              uses: posthog/.github/.github/actions/slack-thread-reply@dd6539b8ffc0cbb64aac209d7fcc6d3fdd7af37e # main
              with:
                  slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
                  slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
                  thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
                  message: '❌ Failed to release `@posthog/pi@${{ steps.check-package-version.outputs.committed-version }}`! <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>'
                  emoji_reaction: 'x'

    notify-released:
        name: Notify Slack - Released
        needs: [notify-approval-needed, publish]
        runs-on: ubuntu-latest
        if: always() && needs.publish.result == 'success' && needs.notify-approval-needed.outputs.slack_ts != ''
        steps:
            - name: Notify Slack - Released
              continue-on-error: true
              uses: posthog/.github/.github/actions/slack-thread-reply@dd6539b8ffc0cbb64aac209d7fcc6d3fdd7af37e # main
              with:
                  slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
                  slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
                  thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
                  message: '🚀 `@posthog/pi` released successfully!'
                  emoji_reaction: 'rocket'
